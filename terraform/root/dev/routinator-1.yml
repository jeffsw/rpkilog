#cloud-config
apt:
  sources:
    nlnetlabs.list:
      source: "deb [arch=amd64] https://packages.nlnetlabs.nl/linux/ubuntu/ $RELEASE main"
      keyid: 94E92A0708C4CC43
disk_setup:
  /dev/sdb:
    layout: true
    overwrite: false
    table_type: gpt
fs_setup:
  - device: /dev/sdb1
    # ext4 defaults to one inode per 16KB disk space.  Create this filesystem with inode per 4KB.
    extra_opts:
      - -i 4096
    filesystem: ext4
    label: routinator-1-dat  # length limitation
    overwrite: false
mounts:
  - [/dev/sdb1, /data]
package_reboot_if_required: true
package_update: true
package_upgrade: true
packages:
  - ca-certificates
  - curl
  - htop
  - incus-agent
  - openssh-server
  - routinator
  - ssh-import-id
users:
  - name: jsw
    groups: adm,docker,sudo
    shell: /usr/bin/bash
    sudo: "ALL=(ALL) NOPASSWD: ALL"
    ssh_authorized_keys:
      - ssh-rsa  jeffsw6@gmail.com boomer 2013-05-28
