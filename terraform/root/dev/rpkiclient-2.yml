#cloud-config
apt:
  sources:
    docker.list:
      source: "deb [arch=amd64] https://download.docker.com/linux/ubuntu $RELEASE stable"
      keyid: 7EA0A9C3F273FCD8
disk_setup:
  /dev/sdb:
    layout: true
    overwrite: false
    table_type: gpt
# At least once, Incus reversed the order of disks; the 20GB data disk became sda (wrong) and the OS
# disk became sdb.  This caused a malfunction as sdb1, which was mounted at /data, was a vfat filesystem
# meant for EFI/UEFI booting, and the below filesystem wasn't created.
# If it happens again we will need to figure out how to fix it.  :/
fs_setup:
  - device: /dev/sdb1
    # ext4 defaults to one inode per 16KB disk space.  Create this filesystem with inode per 4KB.
    extra_opts:
      - -i 4096
    filesystem: ext4
    label: rpkiclient-2-dat  # length limitation
    overwrite: false
mounts:
  - [/dev/sdb1, /data]
package_reboot_if_required: true
package_update: true
package_upgrade: true
packages:
  - ca-certificates
  - curl
  - docker-ce
  - docker-ce-cli
  - htop
  - incus-agent
  - openssh-server
  - python3-bcdoc \
  - python3-boto3 \
  - python3-botocore \
  - python3-full \
  - python3-pip \
  - run-one
  - ssh-import-id
  - bzip2
users:
  - name: jsw
    groups: adm,docker,sudo
    shell: /usr/bin/bash
    sudo: "ALL=(ALL) NOPASSWD: ALL"
    ssh_authorized_keys:
      - ssh-rsa  jeffsw6@gmail.com boomer 2013-05-28
  - name: rpkilog
    shell: /usr/bin/bash
write_files:
  - path: /var/lib/cloud/scripts/per-once/100-rpki-client.sh
    permissions: "0755"
    content: |4
        #!/bin/bash -e

        ARCH=$(uname --machine)      
        VENV_DIR=/opt/rpkilog/venv/
      
        # rpki-client container from https://hub.docker.com/r/rpki/rpki-client
        docker run --name rpkiclient \
          --restart unless-stopped \
          --volume /data/rpkiclient/cache:/var/cache/rpki-client \
          --volume /data/rpkiclient/output:/var/lib/rpki-client \
          --publish 9099:9099/tcp \
          --detach \
          rpki/rpki-client:latest
      
        ##############################
        # Python

        mkdir -p ${VENV_DIR}
        python3 -m venv ${VENV_DIR}
        ${VENV_DIR}/bin/pip install \
          botocore \
          boto3 \
          bcdoc \
          ipython \

        ##############################
        # AWS CLI
        pushd /usr/local/src
        if [[ ${ARCH} = "x86_64" ]]; then
        curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
        elif [[ ${ARCH} = "aarch64" ]]; then
        curl "https://awscli.amazonaws.com/awscli-exe-linux-aarch64.zip" -o "awscliv2.zip"
        else
        echo "Expecting uname --machine output to be x86_64 or aarch64 but it is ${ARCH}"
        exit 1
        fi
        unzip awscliv2.zip
        ./aws/install
        popd

        ##############################
        # rpkilog python from github
        ${VENV_DIR}/bin/pip3 install "git+https://github.com/jeffsw/rpkilog.git#subdirectory=python/rpkilog"
      
        ##############################
        # TODO: rpki summary uploader
        # for rpki-client it should watch the json file for a new timestamp and upload when available
        # for routinator it should be on a schedule (I think) so a one-shot invocation from cron would be fine
  - path: /etc/cron.d/rpkiclient_uploader
    content: |4
        */5 * * * * rpkilog run-one rpkilog-rpkiclient-uploader \
        --json-file-path /data/rpkiclient/output/json \
        --s3-snapshot-summary-bucket rpkilog-snapshot-summary \
        2>&1 | logger -t rpkiclient_uploader
