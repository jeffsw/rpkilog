---
name: ci-python

"on":
  push:
  pull_request:
    branches: [$default-branch]
    types:
      - opened
      - ready_for_review
      - reopened
      - synchronize

permissions:
  contents: read

jobs:
  ci-python:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        python-version:
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          architecture: x64
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest build
          python -m pip install python/rpkilog[dev] python/rpkilog[tests]
      - name: flake8
        run: |
          # only lint certain files for now
          LINT_FILES=(
              # versions of these files in GH-29 branch should pass linting.
              # un-comment as they are merged.
              #
              python/rpkilog/rpkilog/data_file_super.py
              # python/rpkilog/rpkilog/diff_file.py
              # python/rpkilog/rpkilog/diff_import_to_pgsql.py
              python/rpkilog/rpkilog/local_storage_type.py
              python/rpkilog/rpkilog/roa.py
              # python/rpkilog/rpkilog/routinator_snapshot_file.py
              # python/rpkilog/rpkilog/routinator_vrp_fetcher.py
              # python/rpkilog/rpkilog/summary_file.py
              python/rpkilog/rpkilog/util.py
              python/rpkilog/tests
          )
          flake8 --count --show-source --statistics "${LINT_FILES[@]}"
      - name: Obtain AWS credentials from repo variables / secrets
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ vars.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}
      ##### different steps, below, for draft or non-draft PR
      - name: Test with pytest, skipping slow tests for draft PR
        if: github.event.pull_request.draft == true
        timeout-minutes: 15
        run: |
          pushd python/
          pytest --verbose -m "not slow"
          popd
      - name: Test with pytest, including slow tests
        if: github.event.pull_request.draft == false
        timeout-minutes: 15
        run: |
          pushd python/
          pytest --verbose
          popd
      #####
      - name: build
        run: |
          pushd python/rpkilog/
          python -m build
          popd
...
