<!doctype html><html lang="en"><head>
<meta charset="utf-8"><title>Colors — Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--rk-black);}
  .card{padding:18px 24px;font-family:var(--rk-font-mono);color:var(--rk-fg);}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .sw{height:74px;padding:8px 10px;border:1px solid var(--rk-border);display:flex;flex-direction:column;justify-content:space-between;color:var(--rk-fg);}
  .name{font-size:11px;letter-spacing:.08em;font-weight:600;}
  .hex{font-size:11px;font-weight:600;}
  .title{font-size:11px;color:var(--rk-fg-dim);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px;}
</style></head><body><div class="card">
<div class="title">neutrals · bg + stripes + borders</div>
<div class="grid">
  <div class="sw" style="background:#000000"><div class="name">black · bg</div><div class="hex">#000000</div></div>
  <div class="sw" style="background:#0a0e0a"><div class="name">elev</div><div class="hex">#0a0e0a</div></div>
  <div class="sw" style="background:#3a2a1a"><div class="name">stripe</div><div class="hex">#3a2a1a</div></div>
  <div class="sw" style="background:#4a3522"><div class="name">stripe hot</div><div class="hex">#4a3522</div></div>
  <div class="sw" style="background:#1a3320"><div class="name">border dim</div><div class="hex">#1a3320</div></div>
  <div class="sw" style="background:#2a6a3a"><div class="name">border</div><div class="hex">#2a6a3a</div></div>
  <div class="sw" style="background:#0e2a14"><div class="name">green-bg</div><div class="hex">#0e2a14</div></div>
  <div class="sw" style="background:#000;border-style:dashed"><div class="name">— void —</div><div class="hex">no shadows</div></div>
</div>
</div></body></html>
