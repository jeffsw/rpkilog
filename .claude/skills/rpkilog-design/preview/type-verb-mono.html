<!doctype html><html lang="en"><head>
<meta charset="utf-8"><title>Type — Verbs & Code</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--rk-black);}
  .card{padding:18px 24px;font-family:var(--rk-font-mono);color:var(--rk-fg);}
  .row{display:flex;align-items:center;gap:14px;margin-bottom:8px;}
  .label{font-size:11px;color:var(--rk-fg-dim);letter-spacing:.12em;text-transform:uppercase;width:96px;flex:none;}
  .verb{color:var(--rk-fg-hot);font-weight:600;text-transform:uppercase;letter-spacing:.12em;}
  .code{color:var(--rk-fg-hot);}
  .kbd{border:1px solid var(--rk-border);padding:1px 6px;color:var(--rk-fg-hot);font-size:12px;}
  .meta{color:var(--rk-fg-dim);font-size:11px;margin-top:6px;letter-spacing:.08em;}
</style></head><body><div class="card">
<div class="row"><span class="label">verbs</span>
  <span class="verb">REPLACE</span><span class="verb">INSERT</span><span class="verb">DELETE</span><span class="verb">EXPIRE</span></div>
<div class="row"><span class="label">code</span><span class="code">prefix=8.8.8.0/24 &amp; asn=15169 &amp; ta=arin</span></div>
<div class="row"><span class="label">kbd</span><span class="kbd">ENTER</span><span class="kbd">/</span><span class="kbd">ESC</span><span class="kbd">⌘K</span></div>
<div class="row"><span class="label">timestamp</span><span class="code">2026-05-24T14:14:07Z</span></div>
<div class="meta">Uppercase verbs use the .rk-verb class · ISO-8601 only</div>
</div></body></html>
