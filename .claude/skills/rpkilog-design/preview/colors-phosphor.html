<!doctype html><html lang="en"><head>
<meta charset="utf-8"><title>Colors — Phosphor Green</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--rk-black);}
  .card{padding:18px 24px;font-family:var(--rk-font-mono);color:var(--rk-fg);}
  .swatches{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
  .sw{height:74px;display:flex;flex-direction:column;justify-content:space-between;padding:6px 8px;border:1px solid var(--rk-border-dim);}
  .name{font-size:11px;letter-spacing:.08em;color:#000;font-weight:600;}
  .hex{font-size:11px;color:#000;font-weight:600;}
  .title{font-size:11px;color:var(--rk-fg-dim);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px;}
</style></head><body><div class="card">
<div class="title">phosphor green ramp · semantic fg</div>
<div class="swatches">
  <div class="sw" style="background:#66ff99"><div class="name">green-300</div><div class="hex">#66ff99</div></div>
  <div class="sw" style="background:#33ff66"><div class="name">green-400</div><div class="hex">#33ff66</div></div>
  <div class="sw" style="background:#33cc66"><div class="name">green-500 · fg</div><div class="hex">#33cc66</div></div>
  <div class="sw" style="background:#2aa855"><div class="name">green-600 · dim</div><div class="hex">#2aa855</div></div>
  <div class="sw" style="background:#1f7a3d"><div class="name">green-700</div><div class="hex">#1f7a3d</div></div>
</div>
</div></body></html>
