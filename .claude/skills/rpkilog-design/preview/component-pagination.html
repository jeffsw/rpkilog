<!doctype html><html lang="en"><head>
<meta charset="utf-8"><title>Pagination</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--rk-black);}
  .card{padding:18px 24px;font-family:var(--rk-font-mono);color:var(--rk-fg);}
  .title{font-size:11px;color:var(--rk-fg-dim);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px;}
  .page{font-size:12px;color:var(--rk-fg);}
  .page a{color:var(--rk-amber-500);text-decoration:underline;text-underline-offset:2px;margin-right:6px;}
  .page a.current{color:var(--rk-fg-hot);font-weight:700;text-decoration:none;}
  .page a:hover{color:#fff066;}
  .label{color:var(--rk-fg);margin-right:6px;}
  .note{font-size:11px;color:var(--rk-fg-dim);margin-top:8px;}
</style></head><body><div class="card">
<div class="title">pagination · flat row of amber numbers</div>
<div class="page">
  <span class="label">Page:</span>
  <a href="#" class="current">0</a><a href="#">1</a><a href="#">2</a><a href="#">3</a><a href="#">4</a><a href="#">5</a><a href="#">6</a><a href="#">7</a><a href="#">8</a><a href="#">9</a><a href="#">10</a><a href="#">11</a><a href="#">12</a><a href="#">13</a><a href="#">14</a><a href="#">15</a><a href="#">16</a><a href="#">17</a><a href="#">18</a><a href="#">19</a><a href="#">20</a><a href="#">21</a><a href="#">22</a><a href="#">23</a><a href="#">24</a><a href="#">25</a><a href="#">26</a>
</div>
<div class="note">No prev / next buttons. No ellipsis. Every page is reachable in one click.</div>
</div></body></html>
