<!doctype html><html lang="en"><head>
<meta charset="utf-8"><title>Colors — Amber & Links</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--rk-black);}
  .card{padding:18px 24px;font-family:var(--rk-font-mono);color:var(--rk-fg);}
  .swatches{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
  .sw{height:74px;padding:8px 10px;border:1px solid var(--rk-border-dim);display:flex;flex-direction:column;justify-content:space-between;}
  .name{font-size:11px;letter-spacing:.08em;color:#000;font-weight:600;}
  .hex{font-size:11px;color:#000;font-weight:600;}
  .title{font-size:11px;color:var(--rk-fg-dim);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px;}
  .sample{margin-top:14px;font-size:14px;}
  .sample a{color:var(--rk-amber-500);text-decoration:underline;}
</style></head><body><div class="card">
<div class="title">amber · links + focus rings</div>
<div class="swatches">
  <div class="sw" style="background:#fff066"><div class="name">amber-300 hover</div><div class="hex">#fff066</div></div>
  <div class="sw" style="background:#e6d24a"><div class="name">amber-500 · link</div><div class="hex">#e6d24a</div></div>
  <div class="sw" style="background:#b8a23a"><div class="name">amber-600 visited</div><div class="hex">#b8a23a</div></div>
</div>
<div class="sample">e.g. The source is available on <a href="#">GitHub: jeffsw/rpkilog</a>.</div>
</div></body></html>
