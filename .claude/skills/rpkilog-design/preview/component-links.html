<!doctype html><html lang="en"><head>
<meta charset="utf-8"><title>Link States</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--rk-black);}
  .card{padding:18px 24px;font-family:var(--rk-font-mono);color:var(--rk-fg);}
  .title{font-size:11px;color:var(--rk-fg-dim);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px;}
  .row{display:flex;gap:24px;align-items:baseline;font-size:14px;margin-bottom:6px;}
  .lbl{font-size:11px;color:var(--rk-fg-dim);text-transform:uppercase;letter-spacing:.08em;width:80px;}
  .ln{color:#e6d24a;text-decoration:underline;}
  .ln-h{color:#66ff99;text-decoration:underline;}
  .ln-v{color:#b8a23a;text-decoration:underline;}
  .ln-f{color:#e6d24a;text-decoration:underline;outline:2px solid #e6d24a;outline-offset:2px;padding:0 2px;}
</style></head><body><div class="card">
<div class="title">link states · amber → bright green on hover</div>
<div class="row"><span class="lbl">default</span><span class="ln">github.com/jeffsw/rpkilog</span></div>
<div class="row"><span class="lbl">hover</span><span class="ln-h">github.com/jeffsw/rpkilog</span></div>
<div class="row"><span class="lbl">visited</span><span class="ln-v">github.com/jeffsw/rpkilog</span></div>
<div class="row"><span class="lbl">focus</span><span class="ln-f">github.com/jeffsw/rpkilog</span></div>
</div></body></html>
