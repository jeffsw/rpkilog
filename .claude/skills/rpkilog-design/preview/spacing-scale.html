<!doctype html><html lang="en"><head>
<meta charset="utf-8"><title>Spacing — 4px scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--rk-black);}
  .card{padding:18px 24px;font-family:var(--rk-font-mono);color:var(--rk-fg);}
  .row{display:flex;align-items:center;gap:14px;margin-bottom:6px;font-size:12px;}
  .name{color:var(--rk-fg-dim);width:64px;font-size:11px;}
  .bar{height:14px;background:var(--rk-fg);}
  .val{color:var(--rk-fg-dim);font-size:11px;}
  .title{font-size:11px;color:var(--rk-fg-dim);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px;}
</style></head><body><div class="card">
<div class="title">spacing · 4px base · sp-1 … sp-11</div>
<div class="row"><span class="name">sp-1</span><div class="bar" style="width:4px"></div><span class="val">4</span></div>
<div class="row"><span class="name">sp-2</span><div class="bar" style="width:8px"></div><span class="val">8</span></div>
<div class="row"><span class="name">sp-3</span><div class="bar" style="width:12px"></div><span class="val">12</span></div>
<div class="row"><span class="name">sp-4</span><div class="bar" style="width:16px"></div><span class="val">16</span></div>
<div class="row"><span class="name">sp-5</span><div class="bar" style="width:20px"></div><span class="val">20</span></div>
<div class="row"><span class="name">sp-6</span><div class="bar" style="width:24px"></div><span class="val">24</span></div>
<div class="row"><span class="name">sp-7</span><div class="bar" style="width:32px"></div><span class="val">32</span></div>
<div class="row"><span class="name">sp-8</span><div class="bar" style="width:40px"></div><span class="val">40</span></div>
<div class="row"><span class="name">sp-9</span><div class="bar" style="width:48px"></div><span class="val">48</span></div>
<div class="row"><span class="name">sp-10</span><div class="bar" style="width:64px"></div><span class="val">64</span></div>
</div></body></html>
