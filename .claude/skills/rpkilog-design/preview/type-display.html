<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<title>Type — Display (VT323)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; background: var(--rk-black); }
  .card { padding: 18px 24px; font-family: var(--rk-font-mono); color: var(--rk-fg); }
  .row { display: flex; align-items: baseline; gap: 18px; }
  .label { font-size: 11px; color: var(--rk-fg-dim); letter-spacing: 0.12em; text-transform: uppercase; width: 96px; flex: none; }
  .specimen { font-family: var(--rk-font-display); color: var(--rk-fg); line-height: 1.05; }
  .specimen.x5 { font-size: 64px; }
  .specimen.x4 { font-size: 40px; }
  .specimen.x3 { font-size: 28px; }
  .meta { color: var(--rk-fg-dim); font-size: 11px; margin-top: 6px; letter-spacing: 0.08em; }
</style></head>
<body>
<div class="card">
  <div class="row"><span class="label">display</span><span class="specimen x5">rpkilog</span></div>
  <div class="row" style="margin-top:6px"><span class="label">h1 / 64</span><span class="specimen x4">history search</span></div>
  <div class="row" style="margin-top:2px"><span class="label">h2 / 40</span><span class="specimen x3">prefix 8.8.8.0/24</span></div>
  <div class="meta">VT323 · regular · phosphor #33cc66 · for hero text, numerals, ASCII wordmarks</div>
</div>
</body></html>
